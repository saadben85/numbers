<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#080b14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Number Trainer">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-512.png">
<title>تدريب الأرقام</title>

<style>
  :root {
    --bg: #080b14;
    --card: #0f1425;
    --border: #1e2540;
    --accent: #3b82f6;
    --gold: #f59e0b;
    --green: #10b981;
    --red: #ef4444;
    --text: #e8eaf6;
    --muted: #4a5280;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Tajawal', 'Segoe UI', Tahoma, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 35%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(2px 2px at 45% 45%, rgba(255,255,255,0.1) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }
  .container { width: 100%; max-width: 480px; position: relative; z-index: 1; }

  /* HEADER */
  .header { text-align: center; margin-bottom: 28px; }
  .header h1 {
    font-family: 'Bebas Neue', 'Arial Black', Impact, sans-serif;
    font-size: 2.4rem;
    letter-spacing: 5px;
    background: linear-gradient(135deg, #3b82f6, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }

  /* SETUP */
  #setup-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }
  .option-group label {
    display: block;
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .btn-group { display: flex; gap: 10px; }
  .opt-btn {
    flex: 1;
    padding: 12px 8px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    color: var(--muted);
    font-family: 'Tajawal', 'Segoe UI', Tahoma, Arial, sans-serif;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .opt-btn:hover { border-color: var(--accent); color: var(--text); }
  .opt-btn.active {
    background: rgba(59,130,246,0.15);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 700;
  }
  .start-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    border: none;
    border-radius: 14px;
    color: white;
    font-family: 'Tajawal', 'Segoe UI', Tahoma, Arial, sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
    box-shadow: 0 4px 20px rgba(59,130,246,0.3);
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(59,130,246,0.45); }

  /* GAME */
  #game-panel { display: none; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .chips { display: flex; gap: 8px; }
  .stat-chip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 6px 14px;
    font-size: 0.82rem;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .stat-chip span { font-weight: 700; }
  .chip-green span { color: var(--green); }
  .chip-red span { color: var(--red); }
  .chip-blue span { color: var(--accent); }
  .stop-btn {
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 50px;
    padding: 6px 14px;
    color: var(--muted);
    font-family: 'Tajawal', 'Segoe UI', Tahoma, Arial, sans-serif;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .stop-btn:hover { border-color: var(--red); color: var(--red); }

  .progress-wrap { background: var(--border); border-radius: 50px; height: 4px; margin-bottom: 16px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); border-radius: 50px; transition: width 0.3s ease; }

  /* COUNTDOWN TIMER BAR */
  .timer-wrap { background: var(--border); border-radius: 50px; height: 6px; margin-bottom: 14px; overflow: hidden; }
  .timer-bar {
    height: 100%;
    border-radius: 50px;
    width: 100%;
    transform-origin: left;
    background: linear-gradient(90deg, #10b981, #3b82f6);
    transition: none;
  }
  .timer-bar.running {
    transition: width linear;
    width: 0%;
  }
  .timer-bar.warning { background: linear-gradient(90deg, #ef4444, #f59e0b); }

  /* DISPLAY CARD */
  .display-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 36px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
    margin-bottom: 14px;
    min-height: 230px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
  }
  .display-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(59,130,246,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .flag-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    opacity: 0;
    transform: translateY(-8px);
    transition: all 0.3s ease;
  }
  .flag-container.show { opacity: 1; transform: translateY(0); }

  .flag-svg {
    width: 62px;
    height: 42px;
    border-radius: 7px;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    flex-shrink: 0;
  }
  .lang-label { font-size: 0.82rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
  .lang-label.fr { color: #60a5fa; }
  .lang-label.en { color: #f87171; }

  .number-display {
    font-family: 'Bebas Neue', 'Arial Black', Impact, sans-serif;
    font-size: 9rem;
    line-height: 1;
    background: linear-gradient(135deg, #ffffff, #a0aec0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    opacity: 0;
    transform: scale(0.65);
    transition: all 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .number-display.show { opacity: 1; transform: scale(1); }
  .number-display.fr-num { background: linear-gradient(135deg, #93c5fd, #ddd6fe); -webkit-background-clip: text; background-clip: text; }
  .number-display.en-num { background: linear-gradient(135deg, #fca5a5, #fde68a); -webkit-background-clip: text; background-clip: text; }

  @keyframes pulse-ring {
    0% { transform: scale(0.8); opacity: 0.5; }
    100% { transform: scale(1.7); opacity: 0; }
  }
  .pulse-ring {
    position: absolute;
    width: 110px; height: 110px;
    border-radius: 50%;
    border: 2px solid rgba(59,130,246,0.35);
    animation: pulse-ring 0.55s ease-out forwards;
    pointer-events: none;
  }

  @keyframes flash-green { 0% { background: rgba(16,185,129,0.22); } 100% { background: var(--card); } }
  @keyframes flash-red { 0% { background: rgba(239,68,68,0.22); } 100% { background: var(--card); } }
  .display-card.flash-correct { animation: flash-green 0.45s ease-out; }
  .display-card.flash-wrong { animation: flash-red 0.45s ease-out; }

  /* ACTION BUTTONS */
  .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .action-btn {
    padding: 18px;
    border: none;
    border-radius: 16px;
    font-family: 'Tajawal', 'Segoe UI', Tahoma, Arial, sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-correct { background: rgba(16,185,129,0.14); border: 1.5px solid rgba(16,185,129,0.35); color: var(--green); }
  .btn-correct:hover, .btn-correct:active { background: rgba(16,185,129,0.28); border-color: var(--green); transform: scale(0.97); }
  .btn-wrong { background: rgba(239,68,68,0.14); border: 1.5px solid rgba(239,68,68,0.35); color: var(--red); }
  .btn-wrong:hover, .btn-wrong:active { background: rgba(239,68,68,0.28); border-color: var(--red); transform: scale(0.97); }

  /* STATUS DOTS */
  .status-bar { display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; padding: 0 4px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: background 0.2s; }
  .dot.correct { background: var(--green); }
  .dot.wrong { background: var(--red); }
  .dot.current { background: var(--accent); box-shadow: 0 0 7px var(--accent); }

  /* COUNTDOWN */
  #countdown-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(8,11,20,0.92);
    align-items: center;
    justify-content: center;
    z-index: 100;
    flex-direction: column;
    gap: 12px;
  }
  #countdown-overlay.show { display: flex; }
  .countdown-num {
    font-family: 'Bebas Neue', 'Arial Black', Impact, sans-serif;
    font-size: 9rem;
    color: var(--accent);
    animation: countdown-pop 0.85s ease-out forwards;
  }
  @keyframes countdown-pop {
    0% { transform: scale(1.6); opacity: 0; }
    25% { transform: scale(1); opacity: 1; }
    75% { transform: scale(1); opacity: 1; }
    100% { transform: scale(0.4); opacity: 0; }
  }
  .countdown-hint { color: var(--muted); font-size: 0.9rem; letter-spacing: 1px; }

  /* RESULTS */
  #results-panel {
    display: none;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 30px 24px;
    text-align: center;
  }
  .results-title {
    font-family: 'Bebas Neue', 'Arial Black', Impact, sans-serif;
    font-size: 2rem;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .results-sub { color: var(--muted); font-size: 0.82rem; margin-bottom: 6px; }

  .score-circle {
    width: 130px; height: 130px;
    border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin: 16px auto;
    position: relative;
    background: var(--bg);
    border: 3px solid var(--border);
  }
  .score-circle svg { position: absolute; inset: -3px; width: calc(100% + 6px); height: calc(100% + 6px); }
  .score-pct { font-family: 'Bebas Neue', 'Arial Black', Impact, sans-serif; font-size: 2.6rem; color: var(--text); line-height: 1; position: relative; }
  .score-lbl { font-size: 0.68rem; color: var(--muted); letter-spacing: 1px; position: relative; }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px 0 14px; }
  .stat-box { background: var(--bg); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
  .stat-box .val { font-family: 'Bebas Neue', 'Arial Black', Impact, sans-serif; font-size: 2rem; line-height: 1; }
  .stat-box .lbl { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }
  .stat-box.green .val { color: var(--green); }
  .stat-box.red .val { color: var(--red); }
  .stat-box.blue .val { color: var(--accent); }
  .stat-box.gold .val { color: var(--gold); }

  .lang-breakdown { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  .lang-box { background: var(--bg); border: 1px solid var(--border); border-radius: 14px; padding: 14px; text-align: right; }
  .lang-title { font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .fr-box .lang-title { color: #60a5fa; }
  .en-box .lang-title { color: #f87171; }
  .mini-bar-wrap { background: var(--border); border-radius: 50px; height: 6px; overflow: hidden; margin: 6px 0; }
  .mini-bar { height: 100%; border-radius: 50px; transition: width 0.9s ease; width: 0%; }
  .fr-box .mini-bar { background: linear-gradient(90deg, #3b82f6, #818cf8); }
  .en-box .mini-bar { background: linear-gradient(90deg, #ef4444, #f97316); }
  .lang-stat { font-size: 0.78rem; color: var(--muted); }

  .restart-btn {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    border: none; border-radius: 14px;
    color: white; font-family: 'Tajawal', 'Segoe UI', Tahoma, Arial, sans-serif;
    font-size: 1rem; font-weight: 700; cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(59,130,246,0.3);
  }
  .restart-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(59,130,246,0.45); }

  @media (max-width: 400px) {
    .number-display { font-size: 7.5rem; }
    .stat-chip { padding: 5px 10px; font-size: 0.75rem; }
  }
</style>
</head>
<body>

<div id="countdown-overlay">
  <div class="countdown-num" id="countdown-num">3</div>
  <div class="countdown-hint">استعد...</div>
</div>

<div class="container">
  <div class="header">
    <h1>NUMBER TRAINER</h1>
    <p>طوّر تركيزك وإدراكك اللغوي</p>
  </div>

  <!-- SETUP PANEL -->
  <div id="setup-panel">
    <div class="option-group">
      <label>نطاق الأرقام</label>
      <div class="btn-group">
        <button class="opt-btn" onclick="setRange(1000,10000,this)">١٠٠٠-١٠٠٠٠</button>
        <button class="opt-btn" onclick="setRange(500,1000,this)">٥٠٠-١٠٠٠</button>
        <button class="opt-btn" onclick="setRange(100,500,this)">١٠٠-٥٠٠</button>
        <button class="opt-btn active" onclick="setRange(1,100,this)">١-١٠٠</button>
      </div>
    </div>
    <div class="option-group">
      <label>عدد الأرقام في الجلسة</label>
      <div class="btn-group">
        <button class="opt-btn" onclick="setCount('custom',this)">مخصص</button>
        <button class="opt-btn" onclick="setCount('60',this)">٦٠</button>
        <button class="opt-btn" onclick="setCount('40',this)">٤٠</button>
        <button class="opt-btn active" onclick="setCount('20',this)">٢٠</button>
      </div>
      <input type="number" id="custom-count" min="1" max="500" placeholder="اكتب العدد..."
        style="display:none;margin-top:10px;width:100%;padding:11px 14px;background:var(--bg);border:1.5px solid var(--accent);border-radius:12px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:1rem;outline:none;text-align:center;" />
    </div>
    <div class="option-group">
      <label>اللغة</label>
      <div class="btn-group">
        <button class="opt-btn" onclick="setOption('lang','en',this)">🇬🇧 بريطانيا</button>
        <button class="opt-btn active" onclick="setOption('lang','both',this)">🇫🇷🇬🇧 كلاهما</button>
        <button class="opt-btn" onclick="setOption('lang','fr',this)">🇫🇷 فرنسا</button>
      </div>
    </div>

    <div class="option-group">
      <label>سرعة ظهور الأرقام</label>
      <div class="btn-group">
        <button class="opt-btn" onclick="setOption('speed','500',this)">٠.٥ ث</button>
        <button class="opt-btn" onclick="setOption('speed','1000',this)">١ ث</button>
        <button class="opt-btn" onclick="setOption('speed','2000',this)">٢ ث</button>
        <button class="opt-btn" onclick="setOption('speed','3000',this)">٣ ث</button>
        <button class="opt-btn active" onclick="setOption('speed','5000',this)">٥ ث</button>
      </div>
    </div>
    <button class="start-btn" onclick="startCountdown()">▶ ابدأ التدريب</button>
  </div>

  <!-- GAME PANEL -->
  <div id="game-panel">
    <div class="top-bar">
      <div class="chips">
        <div class="stat-chip chip-green">✓ <span id="score-correct">0</span></div>
        <div class="stat-chip chip-red">✗ <span id="score-wrong">0</span></div>
        <div class="stat-chip chip-blue"># <span id="score-total">0</span></div>
      </div>
      <button class="stop-btn" onclick="stopGame()">إيقاف</button>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>

    <div class="timer-wrap">
      <div class="timer-bar" id="timer-bar"></div>
    </div>

    <div class="display-card" id="display-card">
      <div class="flag-container" id="flag-container">
        <div id="flag-svg"></div>
        <span class="lang-label" id="lang-label"></span>
      </div>
      <div class="number-display" id="number-display">—</div>
    </div>

    <div class="action-row">
      <button class="action-btn btn-correct" onclick="answer(true)">✓ صحيح</button>
      <button class="action-btn btn-wrong" onclick="answer(false)">✗ خطأ</button>
    </div>

    <div class="status-bar" id="status-bar"></div>
  </div>

  <!-- RESULTS PANEL -->
  <div id="results-panel">
    <div class="results-title">نتائج الجلسة</div>
    <div class="results-sub" id="results-sub"></div>

    <div class="score-circle">
      <svg viewBox="0 0 136 136" fill="none">
        <circle cx="68" cy="68" r="65" stroke="#1e2540" stroke-width="3"/>
        <circle id="score-arc" cx="68" cy="68" r="65"
          stroke="url(#arcGrad)" stroke-width="3"
          stroke-dasharray="408" stroke-dashoffset="408"
          stroke-linecap="round"
          transform="rotate(-90 68 68)"
          style="transition: stroke-dashoffset 1.1s ease"/>
        <defs>
          <linearGradient id="arcGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#10b981"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="score-pct" id="res-pct">0%</div>
      <div class="score-lbl">دقة</div>
    </div>

    <div class="stats-grid">
      <div class="stat-box green"><div class="val" id="res-correct">0</div><div class="lbl">إجابات صحيحة</div></div>
      <div class="stat-box red"><div class="val" id="res-wrong">0</div><div class="lbl">إجابات خاطئة</div></div>
      <div class="stat-box blue"><div class="val" id="res-total">0</div><div class="lbl">مجموع الأرقام</div></div>
      <div class="stat-box gold"><div class="val" id="res-streak">0</div><div class="lbl">أطول سلسلة صحيحة</div></div>
    </div>

    <div class="lang-breakdown">
      <div class="lang-box fr-box">
        <div class="lang-title"><span>🇫🇷</span> فرنسا</div>
        <div class="mini-bar-wrap"><div class="mini-bar" id="fr-bar"></div></div>
        <div class="lang-stat" id="fr-stat">—</div>
      </div>
      <div class="lang-box en-box">
        <div class="lang-title"><span>🇬🇧</span> بريطانيا</div>
        <div class="mini-bar-wrap"><div class="mini-bar" id="en-bar"></div></div>
        <div class="lang-stat" id="en-stat">—</div>
      </div>
    </div>

    <button class="restart-btn" onclick="restart()">↺ جلسة جديدة</button>
  </div>
</div>

<!-- Hidden SVG flags -->
<svg style="display:none">
  <symbol id="flag-fr" viewBox="0 0 60 40">
    <rect width="20" height="40" fill="#002395"/>
    <rect x="20" width="20" height="40" fill="#EDEDED"/>
    <rect x="40" width="20" height="40" fill="#ED2939"/>
  </symbol>
  <symbol id="flag-gb" viewBox="0 0 60 40">
    <rect width="60" height="40" fill="#012169"/>
    <path d="M0,0 L60,40 M60,0 L0,40" stroke="white" stroke-width="7"/>
    <path d="M0,0 L60,40 M60,0 L0,40" stroke="#C8102E" stroke-width="4.5"/>
    <path d="M30,0 V40 M0,20 H60" stroke="white" stroke-width="11"/>
    <path d="M30,0 V40 M0,20 H60" stroke="#C8102E" stroke-width="6.5"/>
  </symbol>
</svg>

<script>
const options = { rangeMin: 1, rangeMax: 100, count: '20', speed: '5000', lang: 'both' };

function setRange(min, max, btn) {
  options.rangeMin = min;
  options.rangeMax = max;
  btn.closest('.btn-group').querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function setOption(key, val, btn) {
  options[key] = val;
  btn.closest('.btn-group').querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function setCount(val, btn) {
  btn.closest('.btn-group').querySelectorAll('.opt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const input = document.getElementById('custom-count');
  if (val === 'custom') {
    options.count = '';
    input.style.display = 'block';
    input.focus();
    input.oninput = () => { options.count = input.value; };
  } else {
    options.count = val;
    input.style.display = 'none';
    input.value = '';
  }
}

// ---- TIMER BAR ----
let timerBarRAF = null;
function startTimerBar(duration) {
  const bar = document.getElementById('timer-bar');
  bar.style.transition = 'none';
  bar.style.width = '100%';
  bar.classList.remove('running', 'warning');
  void bar.offsetWidth;
  bar.classList.add('running');
  bar.style.transition = `width ${duration}ms linear`;
  bar.style.width = '0%';

  // turn red at last 30%
  const warnAt = duration * 0.4;
  timerBarRAF = setTimeout(() => {
    bar.classList.add('warning');
  }, duration - warnAt);
}
function stopTimerBar() {
  const bar = document.getElementById('timer-bar');
  if (timerBarRAF) { clearTimeout(timerBarRAF); timerBarRAF = null; }
  const computed = parseFloat(getComputedStyle(bar).width);
  const parent   = parseFloat(getComputedStyle(bar.parentElement).width);
  bar.style.transition = 'none';
  bar.style.width = (computed / parent * 100) + '%';
  bar.classList.remove('running');
}
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function beep(freq, type, dur, vol) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol || 0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}
const beepNew     = () => beep(700, 'sine', 0.07, 0.1);
const beepCorrect = () => { beep(880,'sine',0.09,0.1); setTimeout(()=>beep(1100,'sine',0.08,0.09),90); };
const beepWrong   = () => beep(180, 'square', 0.14, 0.09);
const beepWin     = () => { beep(660,'sine',0.1); setTimeout(()=>beep(880,'sine',0.1),120); setTimeout(()=>beep(1100,'sine',0.15),240); };

// ---- GAME STATE ----
let numbers=[], current=0, correctCount=0, wrongCount=0;
let timer=null, streak=0, maxStreak=0;
let frStats={correct:0,total:0}, enStats={correct:0,total:0};
let currentLang='';

// ---- COUNTDOWN ----
function startCountdown() {
  // validate count
  const cnt = parseInt(options.count);
  if (!cnt || cnt < 1) {
    const input = document.getElementById('custom-count');
    input.style.border = '1.5px solid var(--red)';
    input.focus();
    setTimeout(() => input.style.border = '1.5px solid var(--accent)', 1200);
    return;
  }
  getAudio(); // unlock audio
  const overlay = document.getElementById('countdown-overlay');
  const numEl   = document.getElementById('countdown-num');
  overlay.classList.add('show');
  let c = 3;
  numEl.textContent = c;
  beep(440,'sine',0.12);
  const iv = setInterval(() => {
    c--;
    if (c > 0) {
      numEl.style.animation = 'none';
      void numEl.offsetWidth;
      numEl.style.animation = '';
      numEl.textContent = c;
      beep(440,'sine',0.12);
    } else {
      clearInterval(iv);
      overlay.classList.remove('show');
      startGame();
    }
  }, 900);
}

// ---- START GAME ----
function startGame() {
  const min   = options.rangeMin || 1;
  const max   = options.rangeMax || 100;
  const count = parseInt(options.count);

  // Language distribution: true random per number (no predictable pattern)
  const selectedLang = options.lang || 'both';
  numbers = Array.from({length: count}, () => ({
    num:  Math.floor(Math.random() * (max - min + 1)) + min,
    lang: selectedLang === 'both' ? (Math.random() < 0.5 ? 'fr' : 'en') : selectedLang
  }));

  current=0; correctCount=0; wrongCount=0;
  streak=0; maxStreak=0;
  frStats={correct:0,total:0}; enStats={correct:0,total:0};

  // Build dots
  const sb = document.getElementById('status-bar');
  sb.innerHTML = '';
  numbers.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'dot'; d.id = `dot-${i}`;
    sb.appendChild(d);
  });

  document.getElementById('setup-panel').style.display   = 'none';
  document.getElementById('results-panel').style.display = 'none';
  document.getElementById('game-panel').style.display    = 'block';

  updateTopBar();
  showNumber();
}

function showNumber() {
  if (current >= numbers.length) { endGame(); return; }

  const {num, lang} = numbers[current];
  currentLang = lang;

  // dots
  if (current > 0) document.getElementById(`dot-${current-1}`)?.classList.remove('current');
  document.getElementById(`dot-${current}`)?.classList.add('current');

  // progress
  document.getElementById('progress-bar').style.width = (current / numbers.length * 100) + '%';

  const numEl   = document.getElementById('number-display');
  const flagCon = document.getElementById('flag-container');
  const flagSvg = document.getElementById('flag-svg');
  const langLbl = document.getElementById('lang-label');

  numEl.classList.remove('show','fr-num','en-num');
  flagCon.classList.remove('show');

  setTimeout(() => {
    const flagSVGs = {
      fr: `<svg viewBox="0 0 60 40" width="62" height="42" style="border-radius:7px;display:block;box-shadow:0 4px 16px rgba(0,0,0,0.5)"><rect width="20" height="40" fill="#002395"/><rect x="20" width="20" height="40" fill="#EDEDED"/><rect x="40" width="20" height="40" fill="#ED2939"/></svg>`,
      en: `<svg viewBox="0 0 60 40" width="62" height="42" style="border-radius:7px;display:block;box-shadow:0 4px 16px rgba(0,0,0,0.5)"><rect width="60" height="40" fill="#012169"/><line x1="0" y1="0" x2="60" y2="40" stroke="white" stroke-width="8"/><line x1="60" y1="0" x2="0" y2="40" stroke="white" stroke-width="8"/><line x1="0" y1="0" x2="60" y2="40" stroke="#C8102E" stroke-width="5"/><line x1="60" y1="0" x2="0" y2="40" stroke="#C8102E" stroke-width="5"/><rect x="24" y="0" width="12" height="40" fill="white"/><rect x="0" y="14" width="60" height="12" fill="white"/><rect x="26" y="0" width="8" height="40" fill="#C8102E"/><rect x="0" y="16" width="60" height="8" fill="#C8102E"/></svg>`
    };
    flagSvg.innerHTML = flagSVGs[lang];
    langLbl.textContent = lang === 'fr' ? 'FRANÇAIS' : 'ENGLISH';
    langLbl.className = `lang-label ${lang}`;

    numEl.textContent = num;
    numEl.classList.add('show', lang === 'fr' ? 'fr-num' : 'en-num');
    flagCon.classList.add('show');

    // pulse ring
    const card = document.getElementById('display-card');
    const ring = document.createElement('div');
    ring.className = 'pulse-ring';
    card.appendChild(ring);
    setTimeout(() => ring.remove(), 650);

    beepNew();

    // real timer bar + auto-advance
    const speed = parseInt(options.speed);
    startTimerBar(speed);
    timer = setTimeout(() => {
      answer(false); // time's up = wrong
    }, speed);
  }, 110);
}

function answer(correct) {
  if (current >= numbers.length) return;
  if (timer) { clearTimeout(timer); timer = null; }
  stopTimerBar();

  const {lang} = numbers[current];
  const card   = document.getElementById('display-card');

  if (correct) {
    correctCount++; streak++;
    if (streak > maxStreak) maxStreak = streak;
    if (lang==='fr') { frStats.correct++; frStats.total++; } else { enStats.correct++; enStats.total++; }
    card.classList.remove('flash-wrong'); void card.offsetWidth; card.classList.add('flash-correct');
    beepCorrect();
    const dot = document.getElementById(`dot-${current}`);
    if (dot) { dot.classList.remove('current'); dot.classList.add('correct'); }
  } else {
    wrongCount++; streak = 0;
    if (lang==='fr') frStats.total++; else enStats.total++;
    card.classList.remove('flash-correct'); void card.offsetWidth; card.classList.add('flash-wrong');
    beepWrong();
    const dot = document.getElementById(`dot-${current}`);
    if (dot) { dot.classList.remove('current'); dot.classList.add('wrong'); }
  }

  current++;
  updateTopBar();
  setTimeout(showNumber, 280);
}

function updateTopBar() {
  document.getElementById('score-correct').textContent = correctCount;
  document.getElementById('score-wrong').textContent   = wrongCount;
  document.getElementById('score-total').textContent   = current;
}

function stopGame() {
  if (timer) { clearTimeout(timer); timer = null; }
  stopTimerBar();
  endGame();
}

function endGame() {
  if (timer) { clearTimeout(timer); timer = null; }
  stopTimerBar();
  document.getElementById('game-panel').style.display = 'none';

  const total = correctCount + wrongCount;
  const pct   = total > 0 ? Math.round(correctCount / total * 100) : 0;

  document.getElementById('res-pct').textContent     = pct + '%';
  document.getElementById('res-correct').textContent = correctCount;
  document.getElementById('res-wrong').textContent   = wrongCount;
  document.getElementById('res-total').textContent   = total;
  document.getElementById('res-streak').textContent  = maxStreak;

  // Sub message
  const msgs = ['ممتاز جداً! 🔥', 'أداء رائع! 👏', 'جيد، استمر! 💪', 'تحتاج مزيداً من التدريب 📚'];
  const idx  = pct >= 90 ? 0 : pct >= 75 ? 1 : pct >= 50 ? 2 : 3;
  document.getElementById('results-sub').textContent = msgs[idx];

  // Arc animation
  const dashOffset = 408 - (408 * pct / 100);
  setTimeout(() => { document.getElementById('score-arc').style.strokeDashoffset = dashOffset; }, 150);

  // Lang stats
  const frPct = frStats.total > 0 ? Math.round(frStats.correct / frStats.total * 100) : 0;
  const enPct = enStats.total > 0 ? Math.round(enStats.correct / enStats.total * 100) : 0;
  document.getElementById('fr-stat').textContent = `${frStats.correct} / ${frStats.total} (${frPct}%)`;
  document.getElementById('en-stat').textContent = `${enStats.correct} / ${enStats.total} (${enPct}%)`;
  setTimeout(() => {
    document.getElementById('fr-bar').style.width = frPct + '%';
    document.getElementById('en-bar').style.width = enPct + '%';
  }, 250);

  document.getElementById('results-panel').style.display = 'block';
  if (pct >= 80) setTimeout(beepWin, 300);
}

function restart() {
  document.getElementById('results-panel').style.display = 'none';
  document.getElementById('setup-panel').style.display   = 'flex';
}

document.addEventListener('click', () => { if(!audioCtx) getAudio(); }, {once:true});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
